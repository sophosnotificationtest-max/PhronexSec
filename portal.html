<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhronexSec | Portal do Cliente</title>
<meta http-equiv="refresh" content="3;url=https://phronexsec-suporte.onrender.com/auth/login">
<link rel="icon" type="image/png" href="phronexsec-logo.png">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root { --blue:#0076f5; --dark:#02060c; }
* { box-sizing:border-box; margin:0; padding:0; }
body {
  background:var(--dark); color:#e2e8f0;
  font-family:'Plus Jakarta Sans',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
}
canvas#bg { position:fixed; top:0; left:0; z-index:-1; pointer-events:none; }

.card {
  width:100%; max-width:420px;
  background:linear-gradient(145deg,#0a1223,#060e1c);
  border:1px solid rgba(0,118,245,0.28);
  border-radius:24px; padding:52px 40px 44px;
  text-align:center;
  box-shadow:0 40px 80px -20px rgba(0,0,0,0.7),inset 0 1px 0 rgba(255,255,255,0.04);
  margin: 24px;
}
.card-icon {
  width:76px; height:76px; border-radius:20px;
  background:linear-gradient(135deg,rgba(0,118,245,0.18),rgba(96,165,250,0.07));
  border:1px solid rgba(0,118,245,0.3);
  display:flex; align-items:center; justify-content:center;
  margin:0 auto 22px;
  box-shadow:0 0 40px rgba(0,118,245,0.2);
}
h1 { font-size:1.4rem; font-weight:700; letter-spacing:-0.025em; margin-bottom:8px; }
p  { font-size:0.85rem; color:#475569; font-weight:300; line-height:1.7; margin-bottom:32px; }

/* Progress bar */
.progress-wrap {
  width:100%; height:3px;
  background:rgba(30,41,59,0.8);
  border-radius:100px; overflow:hidden;
  margin-bottom:28px;
}
.progress-bar {
  height:100%; width:0%;
  background:linear-gradient(90deg,#0076f5,#60a5fa);
  border-radius:100px;
  animation:fill 3s linear forwards;
}
@keyframes fill { to { width:100%; } }

.redirect-btn {
  display:inline-flex; align-items:center; justify-content:center; gap:9px;
  width:100%; padding:14px;
  background:var(--blue); color:#fff;
  font-weight:600; font-size:0.9rem;
  border:none; border-radius:12px;
  text-decoration:none; transition:.25s; font-family:inherit;
  box-shadow:0 8px 28px rgba(0,118,245,0.35);
  cursor:pointer;
}
.redirect-btn:hover {
  background:#1a8aff;
  box-shadow:0 12px 36px rgba(0,118,245,0.5);
  transform:translateY(-1px);
}
.back-link {
  display:block; margin-top:16px;
  font-size:0.75rem; font-family:'JetBrains Mono',monospace;
  color:#334155; text-decoration:none; transition:color .2s;
}
.back-link:hover { color:#64748b; }
.counter {
  font-size:0.72rem; font-family:'JetBrains Mono',monospace;
  color:#334155; margin-bottom:16px;
}
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div class="card">
  <div class="card-icon">
    <svg width="34" height="34" viewBox="0 0 24 24" fill="none">
      <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#60a5fa"/><stop offset="100%" stop-color="#0076f5"/></linearGradient></defs>
      <rect x="2" y="5" width="20" height="14" rx="3" fill="url(#g)" fill-opacity="0.12" stroke="url(#g)" stroke-width="1.5"/>
      <circle cx="8" cy="12" r="2.5" fill="url(#g)" fill-opacity="0.2" stroke="url(#g)" stroke-width="1.3"/>
      <line x1="13" y1="10" x2="20" y2="10" stroke="url(#g)" stroke-width="1.3" stroke-linecap="round"/>
      <line x1="13" y1="14" x2="17" y2="14" stroke="url(#g)" stroke-width="1.3" stroke-linecap="round"/>
    </svg>
  </div>

  <h1>Portal do Cliente</h1>
  <p>Redirecionando para a central de suporte PhronexSec…</p>

  <div class="progress-wrap">
    <div class="progress-bar"></div>
  </div>

  <p class="counter" id="counter">Aguarde <span id="secs">3</span>s…</p>

  <a href="https://phronexsec-suporte.onrender.com/auth/login" target="_blank" class="redirect-btn" id="redirect-btn">
    <i class="fa-solid fa-arrow-up-right-from-square" style="font-size:13px"></i>
    Acessar agora
  </a>

  <a href="index.html" class="back-link">← Voltar ao site</a>
</div>

<script>
// Countdown
let s = 3;
const el = document.getElementById('secs');
const interval = setInterval(() => {
  s--;
  el.textContent = s;
  if (s <= 0) {
    clearInterval(interval);
    document.getElementById('counter').textContent = 'Redirecionando…';
    window.location.href = 'https://phronexsec-suporte.onrender.com/auth/login';
  }
}, 1000);

// Particles
(function(){
  const c=document.getElementById('bg'),ctx=c.getContext('2d');
  let W,H;
  const pts=Array.from({length:60},()=>({
    x:Math.random()*9999,y:Math.random()*9999,
    vx:(Math.random()-.5)*.2,vy:(Math.random()-.5)*.2,
    r:Math.random()*1.2+.3,a:Math.random()*.3+.07
  }));
  function resize(){ W=c.width=innerWidth; H=c.height=innerHeight; }
  resize(); window.addEventListener('resize',resize);
  (function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0||p.x>W) p.vx*=-1;
      if(p.y<0||p.y>H) p.vy*=-1;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(0,118,245,${p.a})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  })();
})();
</script>
</body>
</html>
